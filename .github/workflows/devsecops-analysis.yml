name: "DevSecOps Analysis"

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

env:
  HUSKY : 0
  
permissions: read-all

jobs:
  analyze:
    name: DevSecOps
    runs-on: ubuntu-24.04
    if: github.actor!= 'depbot'   # ignore the pull request which comes from user depbot.    
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
      with:
        egress-policy: audit

    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Run Microsoft Security DevOps
      uses: microsoft/security-devops-action@5b26a185ff02cf7c100778adeff0ebbf704ca144 # v1
      id: msdo

    - name: Upload results to Security tab
      uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
      with:
        sarif_file: ${{ steps.msdo.outputs.sarifFile }}
        
    - name: Upload alerts artifact
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: alerts
        path: ${{ steps.msdo.outputs.sarifFile }}        